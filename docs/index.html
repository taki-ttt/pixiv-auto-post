// ── GitHub API ──
class GitHubAPI {
  constructor(token, owner, repo) { this.token = token; this.owner = owner; this.repo = repo; this.base = `https://api.github.com/repos/${owner}/${repo}`; }
  async request(path, opts = {}) {
    const res = await fetch(`${this.base}${path}`, { ...opts, headers: { Authorization: `Bearer ${this.token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json', ...opts.headers } });
    if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
    return res.json();
  }
  async getFile(path) { const d = await this.request(`/contents/${path}`); return { content: decodeURIComponent(escape(atob(d.content))), sha: d.sha }; }
  async putFile(path, content, sha, message) { return this.request(`/contents/${path}`, { method: 'PUT', body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(content))), sha }) }); }
}

// ── Google Drive API ──
class DriveAPI {
  constructor(accessToken, refreshCallback) { this.token = accessToken; this.refreshCallback = refreshCallback; }
  async request(url, opts = {}) {
    let res = await fetch(url, { ...opts, headers: { Authorization: `Bearer ${this.token}`, ...opts.headers } });
    if (res.status === 401 && this.refreshCallback) {
      const newToken = await this.refreshCallback();
      if (newToken) {
        this.token = newToken;
        res = await fetch(url, { ...opts, headers: { Authorization: `Bearer ${this.token}`, ...opts.headers } });
      }
    }
    if (!res.ok) throw new Error(`Drive API: ${res.status} ${await res.text()}`);
    return res.json();
  }
  async findFolder(name, parentId) {
    const q = parentId ? `'${parentId}' in parents and name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false` : `name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
    const r = await this.request(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
    return r.files[0] || null;
  }
  async createFolder(name, parentId) {
    return this.request('https://www.googleapis.com/drive/v3/files', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: parentId ? [parentId] : [] }) });
  }
  async listFiles(folderId) {
    const r = await this.request(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,mimeType,thumbnailLink,size)&orderBy=name`);
    return r.files || [];
  }
  async listFolders(parentId) {
    const r = await this.request(`https://www.googleapis.com/drive/v3/files?q='${parentId}'+in+parents+and+mimeType='application/vnd.google-apps.folder'+and+trashed=false&fields=files(id,name)&orderBy=name`);
    return r.files || [];
  }
  async uploadFile(file, folderId) {
    const metadata = { name: file.name, parents: [folderId] };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    form.append('file', file);
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,thumbnailLink', { method: 'POST', headers: { Authorization: `Bearer ${this.token}` }, body: form });
    if (!res.ok) throw new Error(`Upload failed: ${res.status}`);
    return res.json();
  }
  async deleteFile(fileId) {
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}`, { method: 'DELETE', headers: { Authorization: `Bearer ${this.token}` } });
    if (!res.ok) throw new Error(`Delete failed: ${res.status}`);
  }
  async getThumbnail(fileId) {
    return `https://drive.google.com/thumbnail?id=${fileId}&sz=w200`;
  }
}

// ── CSV (RFC 4180準拠: 改行・カンマ・引用符を含むフィールド対応) ──
function parseCSV(text) {
  const rows = []; let current = []; let field = ''; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { current.push(field); field = ''; }
      else if (c === '\n' || (c === '\r' && text[i+1] === '\n')) {
        if (c === '\r') i++;
        current.push(field); field = '';
        if (current.some(f => f !== '')) rows.push(current);
        current = [];
      } else { field += c; }
    }
  }
  if (field || current.length > 0) { current.push(field); if (current.some(f => f !== '')) rows.push(current); }
  if (rows.length < 1) return [];
  const headers = rows[0].map(s => s.trim());
  return rows.slice(1).map(r => { const o = {}; headers.forEach((k, i) => o[k] = (r[i] || '').trim()); return o; });
}
function escapeCSVField(val) { const s = String(val || ''); return (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) ? '"' + s.replace(/"/g, '""') + '"' : s; }
function serializeCSV(rows, headers) { const h = headers || Object.keys(rows[0] || {}); return [h.join(','), ...rows.map(r => h.map(k => escapeCSVField(r[k])).join(','))].join('\n') + '\n'; }
const META_HEADERS = ['post_id','title','tags','caption','x_restrict','ai_type','restrict','posted','posted_at','pixiv_id','image_count'];

// ── Pixiv風タグ入力 ──
const POPULAR_TAGS = ['AI生成','AIイラスト','AI art','オリジナル','女の子','1girl','イラスト','illustration','美少女','創作'];

function TagInput({ tags, onChange, recommended }) {
  const [input, setInput] = useState('');
  const [showSuggest, setShowSuggest] = useState(false);
  const inputRef = useRef(null);
  const tagList = tags ? tags.split('|').filter(Boolean) : [];
  const allSuggestions = [...new Set([...(recommended || []), ...POPULAR_TAGS])];
  const filtered = input.trim() ? allSuggestions.filter(t => t.toLowerCase().includes(input.toLowerCase()) && !tagList.includes(t)) : allSuggestions.filter(t => !tagList.includes(t));

  const addTag = (tag) => {
    const t = tag.trim();
    if (!t || tagList.includes(t)) return;
    if (tagList.length >= 10) return;
    onChange([...tagList, t].join('|'));
    setInput(''); setShowSuggest(false);
    inputRef.current?.focus();
  };
  const removeTag = (idx) => { const n = [...tagList]; n.splice(idx, 1); onChange(n.join('|')); };
  const handleKeyDown = (e) => {
    if ((e.key === 'Enter' || e.key === ' ' || e.key === ',' || e.key === '　') && input.trim()) { e.preventDefault(); addTag(input); }
    if (e.key === 'Backspace' && !input && tagList.length > 0) removeTag(tagList.length - 1);
    if (e.key === 'Escape') setShowSuggest(false);
  };

  return (
    <div className="relative">
      <div className="flex flex-wrap gap-1.5 p-2 border rounded-lg bg-white min-h-[42px] cursor-text" onClick={() => inputRef.current?.focus()}>
        {tagList.map((tag, i) => (
          <span key={i} className="inline-flex items-center gap-1 bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full text-xs font-medium">
            {tag}
            <button onClick={(e) => { e.stopPropagation(); removeTag(i); }} className="hover:text-red-500 ml-0.5">×</button>
          </span>
        ))}
        {tagList.length < 10 && (
          <input ref={inputRef} value={input} onChange={e => { setInput(e.target.value); setShowSuggest(true); }}
            onFocus={() => setShowSuggest(true)} onBlur={() => setTimeout(() => setShowSuggest(false), 200)}
            onKeyDown={handleKeyDown} placeholder={tagList.length === 0 ? "タグを入力（Enterで追加）" : tagList.length < 10 ? `残り${10 - tagList.length}個` : ''}
            className="flex-1 min-w-[100px] outline-none text-sm py-0.5 bg-transparent" />
        )}
      </div>
      <div className="flex items-center justify-between mt-1">
        <span className="text-xs text-gray-400">{tagList.length}/10 タグ</span>
        {tagList.length >= 10 && <span className="text-xs text-orange-500">上限に達しています</span>}
      </div>
      {showSuggest && filtered.length > 0 && (
        <div className="absolute z-20 top-full left-0 right-0 mt-1 bg-white border rounded-lg shadow-lg max-h-48 overflow-y-auto">
          <div className="px-3 py-1.5 text-xs text-gray-400 border-b">おすすめタグ</div>
          {filtered.slice(0, 10).map((t, i) => (
            <button key={i} onMouseDown={(e) => { e.preventDefault(); addTag(t); }} className="w-full text-left px-3 py-2 text-sm hover:bg-blue-50 hover:text-blue-600 transition flex items-center gap-2">
              <span className="text-blue-400 text-xs">#</span>{t}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Badge ──
function Badge({ type, children }) {
  const c = { success: 'bg-green-100 text-green-700', warning: 'bg-yellow-100 text-yellow-700', info: 'bg-blue-100 text-blue-700', danger: 'bg-red-100 text-red-700', gray: 'bg-gray-100 text-gray-600' };
  return <span className={`inline-flex px-2.5 py-0.5 rounded-full text-xs font-medium ${c[type] || c.gray}`}>{children}</span>;
}

// ── Toast ──
function Toast({ message, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const bg = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
  return <div className={`fixed top-4 right-4 z-50 ${bg} text-white px-6 py-3 rounded-lg shadow-lg fade-in`}>{message}</div>;
}

      const api = new GitHubAPI(token, owner, repo);

      client_id: GOOGLE_CLIENT_ID,
      scope: DRIVE_SCOPE,

              <label className="block text-sm font-medium text-gray-700 mb-1">GitHub Personal Access Token</label>

            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">リポジトリ名</label>
              <input type="text" value={repo} onChange={e => setRepo(e.target.value)} className="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm" />

// ── Dashboard ──
function DashboardPage({ config, metadata, perfLog, driveFolders }) {
  const posted = metadata.filter(r => r.posted === 'yes');
  const pending = metadata.filter(r => r.posted !== 'yes');
  const totalViews = perfLog.reduce((s, r) => s + (parseInt(r.views_48h) || 0), 0);
  const avgBMRate = perfLog.length > 0 ? (perfLog.reduce((s, r) => s + (parseFloat(r.bookmark_rate) || 0), 0) / perfLog.length * 100).toFixed(2) : '0.00';
  const cards = [
    { label: '投稿済み', value: posted.length, sub: '件', color: 'text-green-600', bg: 'bg-green-50' },
    { label: '待機中', value: pending.length, sub: '件', color: 'text-blue-600', bg: 'bg-blue-50' },
    { label: '総閲覧数', value: totalViews.toLocaleString(), color: 'text-purple-600', bg: 'bg-purple-50' },
    { label: '平均BM率', value: avgBMRate, sub: '%', color: 'text-orange-600', bg: 'bg-orange-50' },
  ];
  const schedule = config.post_schedule_jst || [];
  const now = new Date(); const jstH = (now.getUTCHours() + 9) % 24; const nowMin = jstH * 60 + now.getUTCMinutes();
  return (
    <div className="fade-in">
      <h2 className="text-2xl font-bold text-gray-800 mb-6">ダッシュボード</h2>
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        {cards.map((c, i) => <div key={i} className={`card ${c.bg} rounded-xl p-5 border border-white`}><p className="text-sm text-gray-500">{c.label}</p><p className={`text-3xl font-bold ${c.color} mt-1`}>{c.value}<span className="text-lg ml-1">{c.sub || ''}</span></p></div>)}
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div className="card bg-white rounded-xl p-6 border">
          <h3 className="font-bold text-gray-700 mb-4">本日のスケジュール</h3>
          <div className="space-y-2">
            {schedule.map((slot, i) => {
              const [h, m] = slot.split(':').map(Number); const sm = h * 60 + m;
              const past = nowMin > sm + 14; const cur = Math.abs(nowMin - sm) <= 14;
              return <div key={i} className={`flex items-center justify-between px-4 py-2.5 rounded-lg ${cur ? 'bg-blue-50 border border-blue-200' : past ? 'bg-gray-50' : 'bg-white border border-gray-100'}`}>
                <span className={`font-mono font-medium ${cur ? 'text-blue-600' : past ? 'text-gray-400' : 'text-gray-700'}`}>{slot}</span>
                {cur ? <Badge type="info">実行中</Badge> : past ? <Badge type="gray">完了</Badge> : <Badge type="warning">待機</Badge>}
              </div>;
            })}
          </div>
        </div>
        <div className="card bg-white rounded-xl p-6 border">
          <h3 className="font-bold text-gray-700 mb-4">直近の投稿</h3>
          {posted.length === 0 ? <p className="text-gray-400 text-sm py-8 text-center">まだ投稿がありません</p> : (
            <div className="space-y-3">{posted.slice(-5).reverse().map((r, i) => (
              <div key={i} className="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
                <div><p className="text-sm font-medium text-gray-700">{r.title || r.post_id}</p><p className="text-xs text-gray-400">{r.posted_at}</p></div>
                {r.pixiv_id && r.pixiv_id !== 'dry_run' && <a href={`https://www.pixiv.net/artworks/${r.pixiv_id}`} target="_blank" className="text-xs text-blue-500 hover:text-blue-700">pixiv#{r.pixiv_id}</a>}
              </div>
            ))}</div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Images Page (NEW) ──
function ImagesPage({ drive, rootFolderId, metadata, metaSha, api, onRefresh, showToast }) {
  const [folders, setFolders] = useState([]);
  const [selectedFolder, setSelectedFolder] = useState(null);
  const [files, setFiles] = useState([]);
  const [loading, setLoading] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [dragActive, setDragActive] = useState(false);
  const [newFolderName, setNewFolderName] = useState('');
  const [showNewFolder, setShowNewFolder] = useState(false);
  const fileInputRef = useRef(null);

  const loadFolders = useCallback(async () => {
    if (!rootFolderId) return;
    setLoading(true);
    try {
      const f = await drive.listFolders(rootFolderId);
      // Filter out 'posted' folder
      setFolders(f.filter(x => x.name !== 'posted'));
    } catch (e) { showToast('フォルダ一覧の取得に失敗', 'error'); }
    setLoading(false);
  }, [drive, rootFolderId]);

  useEffect(() => { loadFolders(); }, [loadFolders]);

  const loadFiles = async (folder) => {
    setSelectedFolder(folder);
    setLoading(true);
    try {
      const f = await drive.listFiles(folder.id);
      setFiles(f.filter(x => x.mimeType && x.mimeType.startsWith('image/')));
    } catch (e) { showToast('ファイル一覧の取得に失敗', 'error'); }
    setLoading(false);
  };

  const handleUpload = async (fileList) => {
    if (!selectedFolder || !fileList.length) return;
    setUploading(true);
    let count = 0;
    for (const file of fileList) {
      if (!file.type.startsWith('image/')) continue;
      try {
        await drive.uploadFile(file, selectedFolder.id);
        count++;
      } catch (e) { showToast(`${file.name} のアップロードに失敗`, 'error'); }
    }
    if (count > 0) showToast(`${count}枚の画像をアップロードしました`, 'success');
    await loadFiles(selectedFolder);
    setUploading(false);
  };

  const handleDrop = (e) => { e.preventDefault(); setDragActive(false); handleUpload(e.dataTransfer.files); };
  const handleDragOver = (e) => { e.preventDefault(); setDragActive(true); };
  const handleDragLeave = () => setDragActive(false);

  const createFolder = async () => {
    if (!newFolderName.trim()) return;
    try {
      await drive.createFolder(newFolderName.trim(), rootFolderId);
      showToast(`フォルダ「${newFolderName}」を作成しました`, 'success');
      setNewFolderName(''); setShowNewFolder(false);
      // Also add to metadata.csv
      const rows = [...metadata];
      const exists = rows.some(r => r.post_id === newFolderName.trim());
      if (!exists) {
        rows.push({ post_id: newFolderName.trim(), title: '', tags: '', caption: '', x_restrict: '', ai_type: '', restrict: '', posted: '', posted_at: '', pixiv_id: '', image_count: '' });
        const csv = serializeCSV(rows, META_HEADERS);
        await api.putFile('metadata.csv', csv, metaSha, `dashboard: add ${newFolderName} to queue`);
        showToast('投稿キューにも自動追加しました', 'success');
      }
      loadFolders();
      onRefresh();
    } catch (e) { showToast('フォルダ作成に失敗: ' + e.message, 'error'); }
  };

  const deleteImage = async (fileId, fileName) => {
    if (!confirm(`「${fileName}」を削除しますか？`)) return;
    try {
      await drive.deleteFile(fileId);
      showToast('画像を削除しました', 'success');
      loadFiles(selectedFolder);
    } catch (e) { showToast('削除に失敗', 'error'); }
  };

  return (
    <div className="fade-in">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h2 className="text-2xl font-bold text-gray-800">画像管理</h2>
          <p className="text-sm text-gray-500 mt-1">Google Drive の pixiv-posts フォルダ内の画像を管理します</p>
        </div>
        <button onClick={() => setShowNewFolder(true)} className="flex items-center gap-1.5 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition">
          {Icons.plus} 新規投稿フォルダ
        </button>
      </div>

      {/* New Folder Modal */}
      {showNewFolder && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 fade-in">
          <div className="bg-white rounded-xl p-6 w-full max-w-md shadow-2xl">
            <h3 className="font-bold text-gray-800 mb-4">新規投稿フォルダを作成</h3>
            <p className="text-sm text-gray-500 mb-3">フォルダ名がそのまま投稿IDになります。投稿キューにも自動追加されます。</p>
            <input type="text" value={newFolderName} onChange={e => setNewFolderName(e.target.value)}
              className="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm mb-4" placeholder="例: post_004" autoFocus />
            <div className="flex gap-2 justify-end">
              <button onClick={() => { setShowNewFolder(false); setNewFolderName(''); }} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm">キャンセル</button>
              <button onClick={createFolder} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm">作成</button>
            </div>
          </div>
        </div>
      )}

      <div className="grid grid-cols-12 gap-6">
        {/* Folder List */}
        <div className="col-span-3">
          <div className="bg-white rounded-xl border p-4">
            <h3 className="font-bold text-gray-700 text-sm mb-3">フォルダ一覧</h3>
            {loading && !selectedFolder ? (
              <div className="py-8 text-center"><div className="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600 mx-auto" /></div>
            ) : folders.length === 0 ? (
              <p className="text-gray-400 text-sm py-4 text-center">フォルダがありません</p>
            ) : (
              <div className="space-y-1">
                {folders.map(f => {
                  const inQueue = metadata.some(r => r.post_id === f.name);
                  const posted = metadata.some(r => r.post_id === f.name && r.posted === 'yes');
                  return (
                    <button key={f.id} onClick={() => loadFiles(f)}
                      className={`w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-left text-sm transition ${selectedFolder?.id === f.id ? 'bg-blue-50 text-blue-700 border border-blue-200' : 'hover:bg-gray-50 text-gray-700'}`}>
                      {Icons.folder}
                      <div className="flex-1 min-w-0">
                        <p className="truncate font-medium">{f.name}</p>
                        {posted ? <p className="text-xs text-green-500">投稿済み</p> : inQueue ? <p className="text-xs text-blue-500">キュー登録済み</p> : <p className="text-xs text-gray-400">未登録</p>}
                      </div>
                    </button>
                  );
                })}
              </div>
            )}
            <button onClick={loadFolders} className="w-full mt-3 flex items-center justify-center gap-1 text-xs text-gray-400 hover:text-gray-600 py-2">
              {Icons.refresh} 更新
            </button>
          </div>
        </div>

        {/* File Area */}
        <div className="col-span-9">
          {!selectedFolder ? (
            <div className="bg-white rounded-xl border p-12 text-center">
              <div className="text-gray-300 mb-4 flex justify-center">{Icons.image}</div>
              <p className="text-gray-500">左のフォルダを選択してください</p>
              <p className="text-sm text-gray-400 mt-1">画像のアップロード・管理ができます</p>
            </div>
          ) : (
            <div>
              {/* Drop Zone */}
              <div className={`drop-zone rounded-xl p-8 mb-4 text-center cursor-pointer ${dragActive ? 'active' : ''}`}
                onDrop={handleDrop} onDragOver={handleDragOver} onDragLeave={handleDragLeave}
                onClick={() => fileInputRef.current?.click()}>
                <input ref={fileInputRef} type="file" multiple accept="image/*" className="hidden" onChange={e => handleUpload(e.target.files)} />
                {uploading ? (
                  <div><div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-3" /><p className="text-sm text-gray-500">アップロード中...</p></div>
                ) : (
                  <div>
                    <div className="flex justify-center mb-3">{Icons.cloud}</div>
                    <p className="text-sm font-medium text-gray-600">ここに画像をドラッグ&ドロップ</p>
                    <p className="text-xs text-gray-400 mt-1">またはクリックしてファイルを選択</p>
                    <p className="text-xs text-blue-500 mt-2 font-medium">フォルダ: {selectedFolder.name}</p>
                  </div>
                )}
              </div>

              {/* Image Grid */}
              <div className="bg-white rounded-xl border p-4">
                <h3 className="font-bold text-gray-700 text-sm mb-3">
                  画像一覧 <span className="text-gray-400 font-normal">({files.length}枚)</span>
                </h3>
                {files.length === 0 ? (
                  <p className="text-gray-400 text-sm py-8 text-center">画像がありません。上のエリアにドラッグ&ドロップしてください。</p>
                ) : (
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                    {files.map(f => (
                      <div key={f.id} className="group relative bg-gray-50 rounded-lg overflow-hidden border hover:border-blue-300 transition">
                        <img src={`https://drive.google.com/thumbnail?id=${f.id}&sz=w300`} alt={f.name}
                          className="w-full h-36 img-thumb" loading="lazy" />
                        <div className="p-2">
                          <p className="text-xs text-gray-600 truncate">{f.name}</p>
                        </div>
                        <button onClick={() => deleteImage(f.id, f.name)}
                          className="absolute top-2 right-2 p-1.5 bg-red-500 text-white rounded-lg opacity-0 group-hover:opacity-100 transition hover:bg-red-600">
                          {Icons.trash}
                        </button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Queue Page ──
function QueuePage({ metadata, metaSha, api, onRefresh, showToast, setPage, templates }) {
  const [rows, setRows] = useState(metadata);
  const [saving, setSaving] = useState(false);
  const [editIdx, setEditIdx] = useState(null);
  const [editRow, setEditRow] = useState(null);
  useEffect(() => setRows(metadata), [metadata]);

  const defaultTags = (templates && templates.tags) ? templates.tags.join('|') : '';
  const addRow = () => {
    const id = `post_${String(rows.length + 1).padStart(3, '0')}`;
    const newRow = { post_id: id, title: '', tags: defaultTags, caption: '', x_restrict: '1', ai_type: '2', restrict: '', posted: '', posted_at: '', pixiv_id: '', image_count: '' };
    setRows([...rows, newRow]);
    setEditIdx(rows.length);
    setEditRow({ ...newRow });
  };
  const openEdit = (idx) => { setEditIdx(idx); setEditRow({ ...rows[idx] }); };
  const closeEdit = () => { setEditIdx(null); setEditRow(null); };
  const confirmEdit = () => {
    if (editIdx !== null && editRow) {
      const n = [...rows]; n[editIdx] = editRow; setRows(n);
    }
    closeEdit();
  };
  const deleteRow = (idx) => { if (rows[idx].posted === 'yes') { showToast('投稿済みは削除不可', 'error'); return; } setRows(rows.filter((_, i) => i !== idx)); };
  const saveAll = async () => {
    setSaving(true);
    try { await api.putFile('metadata.csv', serializeCSV(rows, META_HEADERS), metaSha, 'dashboard: update metadata.csv'); showToast('保存しました', 'success'); onRefresh(); }
    catch (e) { showToast('保存失敗: ' + e.message, 'error'); }
    setSaving(false);
  };
  const pending = rows.filter(r => r.posted !== 'yes'); const posted = rows.filter(r => r.posted === 'yes');
  const recTags = (templates && templates.recommended_tags) || [];

  return (
    <div className="fade-in">
      <div className="flex items-center justify-between mb-6">
        <div><h2 className="text-2xl font-bold text-gray-800">投稿キュー</h2><p className="text-sm text-gray-500 mt-1">待機: {pending.length}件 / 投稿済み: {posted.length}件</p></div>
        <div className="flex gap-2">
          <button onClick={() => setPage('images')} className="flex items-center gap-1.5 px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white text-sm font-medium rounded-lg transition">{Icons.upload} 画像管理</button>
          <button onClick={addRow} className="flex items-center gap-1.5 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition">{Icons.plus} 追加</button>
          <button onClick={saveAll} disabled={saving} className="flex items-center gap-1.5 px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-medium rounded-lg transition disabled:opacity-50">{Icons.save} {saving ? '保存中...' : '保存'}</button>
        </div>
      </div>
      <div className="bg-white rounded-xl border overflow-hidden">
        <table className="w-full">
          <thead><tr className="bg-gray-50 border-b">
            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">ID</th>
            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">タイトル</th>
            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">タグ</th>
            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">制限</th>
            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">ステータス</th>
            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">操作</th>
          </tr></thead>
          <tbody>{rows.map((row, idx) => (
            <tr key={idx} className="border-b last:border-0 hover:bg-gray-50 transition">
              <td className="px-4 py-3"><span className="text-sm font-mono text-gray-700">{row.post_id}</span></td>
              <td className="px-4 py-3"><span className="text-sm text-gray-700">{row.title || <span className="text-gray-400 italic">デフォルト</span>}</span></td>
              <td className="px-4 py-3"><div className="flex flex-wrap gap-1">{row.tags ? row.tags.split('|').filter(Boolean).slice(0, 5).map((t, i) => <span key={i} className="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full text-xs">{t.trim()}</span>) : <span className="text-gray-400 italic text-xs">デフォルト</span>}{row.tags && row.tags.split('|').filter(Boolean).length > 5 && <span className="text-gray-400 text-xs">+{row.tags.split('|').filter(Boolean).length - 5}</span>}</div></td>
              <td className="px-4 py-3">{row.x_restrict === '1' ? <Badge type="danger">R-18</Badge> : <Badge type="success">全年齢</Badge>}</td>
              <td className="px-4 py-3">{row.posted === 'yes' ? <Badge type="success">投稿済み</Badge> : <Badge type="warning">待機中</Badge>}</td>
              <td className="px-4 py-3"><div className="flex gap-1">
                <button onClick={() => openEdit(idx)} className="p-1.5 text-blue-600 hover:bg-blue-50 rounded">{Icons.edit}</button>
                {row.posted !== 'yes' && <button onClick={() => deleteRow(idx)} className="p-1.5 text-red-500 hover:bg-red-50 rounded">{Icons.trash}</button>}
              </div></td>
            </tr>
          ))}</tbody>
        </table>
        {rows.length === 0 && <div className="py-12 text-center text-gray-400"><button onClick={addRow} className="text-blue-500 hover:text-blue-700 text-sm">+ 新しいエントリを追加</button></div>}
      </div>

      {/* 編集モーダル */}
      {editRow && (
        <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 p-4" onClick={closeEdit}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between p-6 border-b">
              <h3 className="text-lg font-bold text-gray-800">投稿を編集</h3>
              <button onClick={closeEdit} className="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
            </div>
            <div className="p-6 space-y-5">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">投稿ID</label>
                <input value={editRow.post_id} onChange={e => setEditRow({ ...editRow, post_id: e.target.value })} className="w-full px-3 py-2 border rounded-lg text-sm font-mono" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">タイトル</label>
                <input value={editRow.title} onChange={e => setEditRow({ ...editRow, title: e.target.value })} className="w-full px-3 py-2 border rounded-lg text-sm" placeholder="空欄の場合はテンプレートの値を使用" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">タグ（最大10個）</label>
                <TagInput tags={editRow.tags} onChange={v => setEditRow({ ...editRow, tags: v })} recommended={recTags} />
                <p className="text-xs text-gray-400 mt-1">Enter・スペース・カンマで追加、おすすめタグをクリックでも追加できます</p>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">キャプション</label>
                <textarea value={editRow.caption} onChange={e => setEditRow({ ...editRow, caption: e.target.value })} className="w-full px-3 py-2 border rounded-lg text-sm h-44 resize-y" placeholder="空欄の場合はテンプレートの値を使用" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">年齢制限</label>
                  <select value={editRow.x_restrict} onChange={e => setEditRow({ ...editRow, x_restrict: e.target.value })} className="w-full px-3 py-2 border rounded-lg text-sm">
                    <option value="">デフォルト</option><option value="0">全年齢</option><option value="1">R-18</option>
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">AI作品タイプ</label>
                  <select value={editRow.ai_type} onChange={e => setEditRow({ ...editRow, ai_type: e.target.value })} className="w-full px-3 py-2 border rounded-lg text-sm">
                    <option value="">デフォルト</option><option value="2">AI生成</option><option value="1">AI非使用</option>
                  </select>
                </div>
              </div>
            </div>
            <div className="flex justify-end gap-3 p-6 border-t bg-gray-50 rounded-b-2xl">
              <button onClick={closeEdit} className="px-4 py-2 text-gray-600 hover:text-gray-800 text-sm font-medium">キャンセル</button>
              <button onClick={confirmEdit} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition">適用</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Schedule Page ──
function SchedulePage({ config, configSha, api, onRefresh, showToast }) {
  const [schedule, setSchedule] = useState(config.post_schedule_jst || []);
  const [limit, setLimit] = useState(config.daily_post_limit || 10);
  const [tolerance, setTolerance] = useState(config.post_tolerance_minutes || 14);
  const [dryRun, setDryRun] = useState(config.dry_run || false);
  const [statsHours, setStatsHours] = useState(config.stats_collect_hours_after || 48);
  const [saving, setSaving] = useState(false);
  const [newTime, setNewTime] = useState('');
  useEffect(() => { setSchedule(config.post_schedule_jst || []); setLimit(config.daily_post_limit || 10); setTolerance(config.post_tolerance_minutes || 14); setDryRun(config.dry_run || false); setStatsHours(config.stats_collect_hours_after || 48); }, [config]);
  const addTime = () => { if (!newTime || schedule.includes(newTime)) return; setSchedule([...schedule, newTime].sort()); setNewTime(''); };
  const removeTime = (t) => setSchedule(schedule.filter(s => s !== t));
  const saveConfig = async () => {
    setSaving(true);
    try { await api.putFile('config.json', JSON.stringify({ _comment: config._comment || '', post_schedule_jst: schedule, daily_post_limit: limit, post_tolerance_minutes: tolerance, stats_collect_hours_after: statsHours, dry_run: dryRun }, null, 2) + '\n', configSha, 'dashboard: update config.json'); showToast('設定を保存しました', 'success'); onRefresh(); }
    catch (e) { showToast('保存失敗: ' + e.message, 'error'); }
    setSaving(false);
  };
  return (
    <div className="fade-in">
      <div className="flex items-center justify-between mb-6">
        <h2 className="text-2xl font-bold text-gray-800">スケジュール設定</h2>
        <button onClick={saveConfig} disabled={saving} className="flex items-center gap-1.5 px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-medium rounded-lg transition disabled:opacity-50">{Icons.save} {saving ? '保存中...' : '設定を保存'}</button>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div className="card bg-white rounded-xl p-6 border">
          <h3 className="font-bold text-gray-700 mb-4">投稿時間（JST）</h3>
          <div className="flex gap-2 mb-4"><input type="time" value={newTime} onChange={e => setNewTime(e.target.value)} className="flex-1 px-3 py-2 border rounded-lg text-sm" /><button onClick={addTime} className="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700">追加</button></div>
          <div className="grid grid-cols-2 gap-2">{schedule.map((t, i) => <div key={i} className="flex items-center justify-between bg-blue-50 px-4 py-2.5 rounded-lg"><span className="font-mono font-medium text-blue-700">{t}</span><button onClick={() => removeTime(t)} className="text-red-400 hover:text-red-600"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button></div>)}</div>
        </div>
        <div className="space-y-4">
          <div className="card bg-white rounded-xl p-6 border">
            <h3 className="font-bold text-gray-700 mb-4">投稿設定</h3>
            <div className="space-y-4">
              <div><label className="block text-sm font-medium text-gray-600 mb-1">1日の投稿上限</label><div className="flex items-center gap-3"><input type="range" min="1" max="20" value={limit} onChange={e => setLimit(parseInt(e.target.value))} className="flex-1 accent-blue-600" /><span className="text-lg font-bold text-blue-600 w-8 text-center">{limit}</span></div></div>
              <div><label className="block text-sm font-medium text-gray-600 mb-1">許容範囲（分）</label><div className="flex items-center gap-3"><input type="range" min="1" max="30" value={tolerance} onChange={e => setTolerance(parseInt(e.target.value))} className="flex-1 accent-blue-600" /><span className="text-lg font-bold text-blue-600 w-8 text-center">{tolerance}</span></div></div>
              <div><label className="block text-sm font-medium text-gray-600 mb-1">統計収集待機（時間）</label><div className="flex items-center gap-3"><input type="range" min="12" max="96" step="12" value={statsHours} onChange={e => setStatsHours(parseInt(e.target.value))} className="flex-1 accent-blue-600" /><span className="text-lg font-bold text-blue-600 w-12 text-center">{statsHours}h</span></div></div>
            </div>
          </div>
          <div className="card bg-white rounded-xl p-6 border">
            <div className="flex items-center justify-between"><div><h3 className="font-bold text-gray-700">ドライランモード</h3><p className="text-sm text-gray-500 mt-1">有効にすると実際の投稿は行われません</p></div><div className={`toggle-switch ${dryRun ? 'on' : ''}`} onClick={() => setDryRun(!dryRun)} /></div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Templates Page ──
function TemplatesPage({ templates, templatesSha, api, onRefresh, showToast }) {
  const [title, setTitle] = useState(templates.title || '');
  const [tags, setTags] = useState((templates.tags || []).join(', '));
  const [caption, setCaption] = useState(templates.caption || '');
  const [xR, setXR] = useState(templates.x_restrict ?? 0);
  const [aiT, setAiT] = useState(templates.ai_type ?? 2);
  const [rest, setRest] = useState(templates.restrict ?? 0);
  const [saving, setSaving] = useState(false);
  useEffect(() => { setTitle(templates.title || ''); setTags((templates.tags || []).join(', ')); setCaption(templates.caption || ''); setXR(templates.x_restrict ?? 0); setAiT(templates.ai_type ?? 2); setRest(templates.restrict ?? 0); }, [templates]);
  const save = async () => {
    setSaving(true);
    try { await api.putFile('templates.json', JSON.stringify({ _comment: templates._comment || '', title, tags: tags.split(',').map(t => t.trim()).filter(Boolean), caption, x_restrict: xR, ai_type: aiT, restrict: rest, recommended_tags: templates.recommended_tags || [] }, null, 2) + '\n', templatesSha, 'dashboard: update templates.json'); showToast('テンプレートを保存しました', 'success'); onRefresh(); }
    catch (e) { showToast('保存失敗: ' + e.message, 'error'); }
    setSaving(false);
  };
  const recTags = templates.recommended_tags || [];
  return (
    <div className="fade-in">
      <div className="flex items-center justify-between mb-6"><h2 className="text-2xl font-bold text-gray-800">テンプレート設定</h2><button onClick={save} disabled={saving} className="flex items-center gap-1.5 px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-medium rounded-lg transition disabled:opacity-50">{Icons.save} {saving ? '保存中...' : '保存'}</button></div>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div className="lg:col-span-2 space-y-4">
          <div className="card bg-white rounded-xl p-6 border"><h3 className="font-bold text-gray-700 mb-4">デフォルト値</h3><div className="space-y-4">
            <div><label className="block text-sm font-medium text-gray-600 mb-1">タイトル</label><input type="text" value={title} onChange={e => setTitle(e.target.value)} className="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm" /></div>
            <div><label className="block text-sm font-medium text-gray-600 mb-1">タグ（カンマ区切り）</label><input type="text" value={tags} onChange={e => setTags(e.target.value)} className="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm" /></div>
            <div><label className="block text-sm font-medium text-gray-600 mb-1">キャプション</label><textarea value={caption} onChange={e => setCaption(e.target.value)} rows={3} className="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm resize-none" /></div>
          </div></div>
          <div className="card bg-white rounded-xl p-6 border"><h3 className="font-bold text-gray-700 mb-4">コンテンツ設定</h3><div className="grid grid-cols-3 gap-4">
            <div><label className="block text-sm font-medium text-gray-600 mb-1">年齢制限</label><select value={xR} onChange={e => setXR(parseInt(e.target.value))} className="w-full px-3 py-2.5 border rounded-lg text-sm"><option value={0}>全年齢</option><option value={1}>R-18</option></select></div>
            <div><label className="block text-sm font-medium text-gray-600 mb-1">AI種別</label><select value={aiT} onChange={e => setAiT(parseInt(e.target.value))} className="w-full px-3 py-2.5 border rounded-lg text-sm"><option value={0}>オリジナル</option><option value={1}>非AI</option><option value={2}>AI生成</option></select></div>
            <div><label className="block text-sm font-medium text-gray-600 mb-1">公開範囲</label><select value={rest} onChange={e => setRest(parseInt(e.target.value))} className="w-full px-3 py-2.5 border rounded-lg text-sm"><option value={0}>公開</option><option value={1}>マイピク限定</option></select></div>
          </div></div>
        </div>
        <div className="card bg-white rounded-xl p-6 border h-fit"><h3 className="font-bold text-gray-700 mb-4">推奨タグ</h3><p className="text-xs text-gray-500 mb-3">週次分析で自動更新</p>
          {recTags.length === 0 ? <p className="text-gray-400 text-sm py-4 text-center">データ不足</p> : <div className="space-y-2">{recTags.map((t, i) => <div key={i} className="flex items-center justify-between py-1.5"><span className="text-sm text-gray-700">{typeof t === 'object' ? t.tag : t}</span><span className="text-xs font-mono text-green-600">{typeof t === 'object' ? (t.avg_bookmark_rate * 100).toFixed(1) + '%' : ''}</span></div>)}</div>}
        </div>
      </div>
    </div>
  );
}

// ── Analytics Page ──
function AnalyticsPage({ perfLog }) {
  if (perfLog.length === 0) return <div className="fade-in"><h2 className="text-2xl font-bold text-gray-800 mb-6">パフォーマンス分析</h2><div className="card bg-white rounded-xl p-12 border text-center"><p className="text-gray-500">データがまだありません</p><p className="text-sm text-gray-400 mt-2">投稿後48時間で自動収集されます</p></div></div>;
  const sorted = [...perfLog].sort((a, b) => (parseFloat(b.bookmark_rate) || 0) - (parseFloat(a.bookmark_rate) || 0));
  const totalV = perfLog.reduce((s, r) => s + (parseInt(r.views_48h) || 0), 0);
  const totalB = perfLog.reduce((s, r) => s + (parseInt(r.bookmarks_48h) || 0), 0);
  const avgBM = perfLog.reduce((s, r) => s + (parseFloat(r.bookmark_rate) || 0), 0) / perfLog.length;
  const tagMap = {}; perfLog.forEach(r => (r.tags || '').split('|').forEach(t => { t = t.trim(); if (!t) return; if (!tagMap[t]) tagMap[t] = []; tagMap[t].push(parseFloat(r.bookmark_rate) || 0); }));
  const tagRank = Object.entries(tagMap).filter(([_, v]) => v.length >= 2).map(([tag, r]) => ({ tag, avg: r.reduce((a, b) => a + b, 0) / r.length, count: r.length })).sort((a, b) => b.avg - a.avg).slice(0, 10);
  return (
    <div className="fade-in">
      <h2 className="text-2xl font-bold text-gray-800 mb-6">パフォーマンス分析</h2>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div className="card bg-white rounded-xl p-5 border"><p className="text-sm text-gray-500">総閲覧数</p><p className="text-2xl font-bold text-purple-600">{totalV.toLocaleString()}</p></div>
        <div className="card bg-white rounded-xl p-5 border"><p className="text-sm text-gray-500">総ブックマーク</p><p className="text-2xl font-bold text-pink-600">{totalB.toLocaleString()}</p></div>
        <div className="card bg-white rounded-xl p-5 border"><p className="text-sm text-gray-500">平均BM率</p><p className="text-2xl font-bold text-orange-600">{(avgBM * 100).toFixed(2)}%</p></div>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div className="card bg-white rounded-xl p-6 border"><h3 className="font-bold text-gray-700 mb-4">Top 10 投稿</h3><table className="w-full"><thead><tr className="border-b"><th className="pb-2 text-left text-xs font-semibold text-gray-500">#</th><th className="pb-2 text-left text-xs font-semibold text-gray-500">投稿ID</th><th className="pb-2 text-right text-xs font-semibold text-gray-500">閲覧</th><th className="pb-2 text-right text-xs font-semibold text-gray-500">BM</th><th className="pb-2 text-right text-xs font-semibold text-gray-500">BM率</th></tr></thead><tbody>{sorted.slice(0, 10).map((r, i) => <tr key={i} className="border-b last:border-0"><td className="py-2 text-sm text-gray-400">{i + 1}</td><td className="py-2 text-sm font-medium text-gray-700">{r.post_id}</td><td className="py-2 text-sm text-right">{parseInt(r.views_48h || 0).toLocaleString()}</td><td className="py-2 text-sm text-right">{parseInt(r.bookmarks_48h || 0).toLocaleString()}</td><td className="py-2 text-sm text-right font-mono text-green-600">{((parseFloat(r.bookmark_rate) || 0) * 100).toFixed(2)}%</td></tr>)}</tbody></table></div>
        <div className="card bg-white rounded-xl p-6 border"><h3 className="font-bold text-gray-700 mb-4">タグ効果ランキング</h3>{tagRank.length === 0 ? <p className="text-gray-400 text-sm py-8 text-center">2件以上使用されたタグがありません</p> : <div className="space-y-3">{tagRank.map((t, i) => <div key={i} className="flex items-center gap-3"><span className="text-xs text-gray-400 w-5">{i + 1}</span><div className="flex-1"><div className="flex items-center justify-between mb-1"><span className="text-sm font-medium text-gray-700">{t.tag}</span><span className="text-xs font-mono text-green-600">{(t.avg * 100).toFixed(2)}%</span></div><div className="w-full bg-gray-100 rounded-full h-1.5"><div className="bg-blue-500 h-1.5 rounded-full" style={{ width: `${Math.min(t.avg / (tagRank[0]?.avg || 1) * 100, 100)}%` }} /></div></div></div>)}</div>}</div>
      </div>
    </div>
  );
}

// ── Main App ──
function App() {
  const [auth, setAuth] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState(null);
  const [config, setConfig] = useState({}); const [configSha, setConfigSha] = useState('');
  const [metadata, setMetadata] = useState([]); const [metaSha, setMetaSha] = useState('');
  const [templates, setTemplates] = useState({}); const [templatesSha, setTemplatesSha] = useState('');
  const [perfLog, setPerfLog] = useState([]);
  const [rootFolderId, setRootFolderId] = useState(null);
  const apiRef = useRef(null);
  const driveRef = useRef(null);

  const showToast = (message, type = 'info') => setToast({ message, type });

  const loadData = useCallback(async () => {
    if (!apiRef.current) return;
    setLoading(true);
    try {
      const api = apiRef.current;
      const [cfgD, metaD, tmplD, perfD] = await Promise.all([
        api.getFile('config.json'), api.getFile('metadata.csv'), api.getFile('templates.json'),
        api.getFile('performance_log.csv').catch(() => ({ content: '', sha: '' })),
      ]);
      setConfig(JSON.parse(cfgD.content)); setConfigSha(cfgD.sha);
      setMetadata(parseCSV(metaD.content)); setMetaSha(metaD.sha);
      setTemplates(JSON.parse(tmplD.content)); setTemplatesSha(tmplD.sha);
      setPerfLog(perfD.content ? parseCSV(perfD.content) : []);
    } catch (e) { showToast('データ読み込み失敗: ' + e.message, 'error'); }
    setLoading(false);
  }, []);

  const refreshGoogleToken = useCallback(() => {
    return new Promise((resolve) => {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: DRIVE_SCOPE,
        callback: (response) => {
          if (response.access_token) {
            setAuth(prev => prev ? { ...prev, googleToken: response.access_token } : prev);
            resolve(response.access_token);
          } else { resolve(null); }
        },
      });
      client.requestAccessToken();
    });
  }, []);

  const initDrive = useCallback(async (googleToken) => {
    const drive = new DriveAPI(googleToken, refreshGoogleToken);
    driveRef.current = drive;
    try {
      let folder = await drive.findFolder('pixiv-posts');
      if (!folder) {
        showToast('pixiv-posts フォルダを作成中...', 'success');
        folder = await drive.createFolder('pixiv-posts');
      }
      setRootFolderId(folder.id);
      showToast('Google Drive に接続しました', 'success');
    } catch (e) { showToast('Drive接続エラー: ' + e.message, 'error'); }
  }, [refreshGoogleToken]);

  const handleLogin = (creds) => {
    apiRef.current = new GitHubAPI(creds.token, creds.owner, creds.repo);
    setAuth(creds);
    initDrive(creds.googleToken);
  };

  useEffect(() => { if (auth) loadData(); }, [auth, loadData]);

  if (!auth) return <LoginScreen onLogin={handleLogin} />;

  return (
    <div className="flex">
      <Sidebar page={page} setPage={setPage} onLogout={() => { setAuth(null); apiRef.current = null; driveRef.current = null; }} />
      <main className="flex-1 ml-60 p-8 min-h-screen">
        {loading ? <div className="flex items-center justify-center h-64"><div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600" /></div> : <>
          {page === 'dashboard' && <DashboardPage config={config} metadata={metadata} perfLog={perfLog} />}
          {page === 'queue' && <QueuePage metadata={metadata} metaSha={metaSha} api={apiRef.current} onRefresh={loadData} showToast={showToast} setPage={setPage} templates={templates} />}
          {page === 'images' && <ImagesPage drive={driveRef.current} rootFolderId={rootFolderId} metadata={metadata} metaSha={metaSha} api={apiRef.current} onRefresh={loadData} showToast={showToast} />}
          {page === 'schedule' && <SchedulePage config={config} configSha={configSha} api={apiRef.current} onRefresh={loadData} showToast={showToast} />}
          {page === 'templates' && <TemplatesPage templates={templates} templatesSha={templatesSha} api={apiRef.current} onRefresh={loadData} showToast={showToast} />}
          {page === 'analytics' && <AnalyticsPage perfLog={perfLog} />}
        </>}
        <div className="mt-8 flex justify-end"><button onClick={loadData} className="flex items-center gap-1.5 px-3 py-1.5 text-gray-400 hover:text-gray-600 text-xs transition">{Icons.refresh} データを再読み込み</button></div>
      </main>
      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
